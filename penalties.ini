[penalties]
# uncovered_slot:
# Kara za każdy nieobsadzony slot (gdy w przedziale nie ma ani jednej osoby).
# To najważniejsza kara w modelu — zwykle powinna być najwyższa.
uncovered_slot = 10000

# zero_violation:
# Kara za naruszenie wpisu "0" (urlop / twarda niedostępność).
# Wysoka wartość, aby model bardzo niechętnie łamał zakaz.
zero_violation = 3000

# blank_fallback_first:
# Kara za wykorzystanie pustej komórki jako pozycji "1".
# Puste jest dopuszczone tylko awaryjnie (gdy nikt nie ma 1/2/P),
# ale nadal chcemy to zniechęcać.
blank_fallback_first = 180

# pref2_as_first:
# Kara za przydzielenie pozycji "1" osobie z preferencją "2".
# "2" oznacza preferencję bycia drugim, ale nie twardy zakaz bycia pierwszym.
pref2_as_first = 120

# no_free_sunday:
# Kara za naruszenie reguły "co najmniej jedna wolna niedziela na osobę".
# Im większa wartość, tym silniej model pilnuje wolnych niedziel.
no_free_sunday = 220

# weekend_both_days:
# Kara za sytuację, gdy ta sama osoba ma dyżur i w sobotę, i w niedzielę
# tego samego weekendu.
weekend_both_days = 220

# change_between_slots:
# Kara za zmiany obsady między kolejnymi slotami tej samej doby dyżurowej.
# Zwiększenie tej wagi ogranicza "piłę" (częste przeskakiwanie osób).
change_between_slots = 35

# fair_total_difference:
# Kara za różnice w łącznej liczbie przydziałów między osobami.
# Większa wartość => bardziej równy całkowity podział dyżurów.
fair_total_difference = 25

# fair_first_difference:
# Kara za różnice w liczbie pozycji "1" między osobami.
# Większa wartość => bardziej równy rozkład "bycia pierwszym".
fair_first_difference = 35

# first_assignment:
# Dodatkowy koszt każdej pozycji "1" (globalnie w całym harmonogramie).
# Dodatnia wartość zmniejsza skłonność do przydzielania "1", jeśli są alternatywy.
first_assignment = 8

# second_assignment:
# Dodatkowy koszt każdej pozycji "2".
# Ujemna wartość działa jak "nagroda", czyli model chętniej wybiera pozycję "2".
second_assignment = -6
